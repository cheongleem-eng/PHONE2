<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B737 Interphone - Complete Handset</title>
    <style>
        /* 1. 배경 설정 (검정색) */
        body {
            background-color: black; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white; /* 기본 글자색 하얀색 */
        }

        /* 2. 인터폰 본체 (회색, 요청하신 대로 전체 비율 압축) */
        .handset-body {
            background-color: #838383; /* Grey */
            width: 160px; /* 폭 미세 축소 */
            height: 600px; /* 요청하신 대로 전체 길이 대폭 압축 (680px -> 600px) */
            border-radius: 30px; /* 콤팩트해진 크기에 맞춘 곡률 */
            box-shadow: 15px 15px 50px rgba(0,0,0,0.9), inset -2px -2px 5px rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px; /* 위아래 패딩 미세 축소 */
            border: 3px solid #6a6a6a;
            box-sizing: border-box;
        }

        /* 3. 상단: 귀 대는 곳 (Earpiece - 비율 맞춰 미세 축소) */
        .earpiece-area {
            width: 100%;
            height: 90px;
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
        }
        .earpiece-concave {
            width: 80px;
            height: 80px;
            background: #6a6a6a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 8px 8px 15px rgba(0,0,0,0.7), inset -3px -3px 8px rgba(255,255,255,0.1);
        }
        .speaker-holes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .hole { width: 5px; height: 5px; background: #111; border-radius: 50%; }

        /* 4. 정보 패널 (라벨) */
        .info-panel {
            width: 90%;
            background: rgba(0,0,0,0.2);
            border: 1px solid #777;
            padding: 6px 0;
            text-align: center;
            margin-bottom: 12px;
        }
        .info-text { font-size: 8px; color: #ccc; font-family: monospace; }
        .sn-sticker { 
            background: #eee; color: #000; font-size: 9px; 
            padding: 1px 10px; margin: 3px 0; /* 90%에 맞춤 */
            display: inline-block; font-weight: bold; 
        }

        /* 5. 중앙: 키패드 (콤팩트 정렬) */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }
        .key {
            background: linear-gradient(145deg, #555, #333);
            border: 1px solid #1a1a1a;
            color: white;
            cursor: pointer;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.8);
            transition: 0.05s active;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .key:active { transform: translateY(2px); background: #111; }
        .num { width: 35px; height: 35px; border-radius: 50%; font-size: 15px; font-weight: bold; }

        /* 6. PTT 버튼 (비율 수정본 유지) */
        .ptt-area { 
            width: 92%;
            margin-bottom: 18px; 
            display: flex;
            justify-content: center;
        }
        .ptt-btn {
            width: 100%;
            height: 55px; /* 단단한 크기 유지 */
            border-radius: 27px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 0;
            overflow: hidden;
        }
        .pa-text { font-size: 7.5px; margin-bottom: 3px; white-space: nowrap; }
        .ptt-text { font-size: 12px; font-weight: bold; color: white; }

        /* 7. RESET 버튼 (비율 유지) */
        .reset-area { margin-bottom: 22px; }
        .reset-btn { width: 38px; height: 38px; border-radius: 50%; font-size: 7.5px; font-weight: bold; }

        /* 8. 하단: 말하는 곳 (Mouthpiece - 요청하신 대로 대폭 축소) */
        .mouthpiece-area {
            width: 50px; /* 요청하신 대로 동그라미 크게 줄임 (75px -> 50px) */
            height: 50px; /* 요청하신 대로 동그라미 크게 줄임 (75px -> 50px) */
            background: #6a6a6a;
            border-radius: 50%;
            border: 3px solid #777;
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.8), inset -3px -3px 8px rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-top: 5px; /* 간격 축소 */
        }
        .mesh-pattern {
            width: 100%;
            height: 100%;
            background-color: #333;
            /* 작은 원에 맞춘 finer mesh 격자 패턴 */
            background-image: radial-gradient(#555 1px, transparent 1px);
            background-size: 3.5px 3.5px;
        }

        /* 방송 활성화(8번 누름) 상태 효과 (하얀색 테두리와 광) */
        .active-mode { border: 2px solid #ffffff !important; box-shadow: 0 0 15px rgba(255,255,255,0.5) !important; }

    </style>
</head>
<body>

    <div class="handset-body">
        <div class="earpiece-area">
            <div class="earpiece-concave">
                <div class="speaker-holes">
                    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                    <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <div class="info-text">285W0024-23M MOD NONE</div>
            <div class="sn-sticker">S/N F58930</div>
            <div class="info-text">BAE SYSTEMS</div>
        </div>

        <div class="keypad">
            <button class="key num" onclick="handleKeyPress('1')">1</button>
            <button class="key num" onclick="handleKeyPress('2')">2</button>
            <button class="key num" onclick="handleKeyPress('3')">3</button>
            <button class="key num" onclick="handleKeyPress('4')">4</button>
            <button class="key num" onclick="handleKeyPress('5')">5</button>
            <button class="key num" onclick="handleKeyPress('6')">6</button>
            <button class="key num" onclick="handleKeyPress('7')">7</button>
            <button class="key num" onclick="handleKeyPress('8')">8</button>
            <button class="key num" onclick="handleKeyPress('9')">9</button>
            <button class="key num" onclick="handleKeyPress('*')">*</button>
            <button class="key num" onclick="handleKeyPress('0')">0</button>
            <button class="key num" onclick="handleKeyPress('#')">#</button>
        </div>

        <div class="ptt-area">
            <button id="ptt-btn" class="key ptt-btn" onmousedown="startPA()" onmouseup="stopPA()">
                <div class="pa-text">PASSENGER ADDRESS</div>
                <div class="ptt-text">PUSH TO TALK</div>
            </button>
        </div>

        <div class="reset-area">
            <button id="reset-btn" class="key reset-btn" onclick="resetAll()">RESET</button>
        </div>

        <div class="mouthpiece-area">
            <div class="mesh-pattern"></div>
        </div>
    </div>

    <audio id="snd-click" src="sounds/click.mp3" preload="auto"></audio>
    <audio id="snd-chime-2" src="sounds/chime-2.mp3" preload="auto"></audio>
    <audio id="snd-chime-5" src="sounds/chime-5.mp3" preload="auto"></audio>
    <audio id="snd-bgm" src="button bgm.mp3" preload="auto"></audio>
    <audio id="snd-five-bgm" src="five bgm.mp3" preload="auto"></audio>
    <audio id="snd-two-bgm" src="two bgm.mp3" preload="auto"></audio>

    <script>
        let isPaMode = false;
        let audioCtx, micSource, delayNode, feedbackGain, micStream;

        function playSound(id) {
            const snd = document.getElementById(id);
            if (!snd) return Promise.resolve();
            
            snd.currentTime = 0;
            return snd.play().catch(err => {
                console.warn("Audio play blocked or failed:", id, err);
            });
        }

        function handleKeyPress(key) {
            playSound('snd-bgm').then(() => {
                if (key === '5') {
                    setTimeout(() => { playSound('snd-five-bgm'); }, 200);
                } else if (key === '2') {
                    setTimeout(() => { playSound('snd-two-bgm'); }, 200);
                }
            });

            if (key === '8') {
                isPaMode = true;
                document.getElementById('ptt-btn').classList.add('active-mode');
            } else if (key === '2' || key === '5') {
                resetPaStatus();
            } else {
                playSound('snd-click');
                resetPaStatus();
            }
        }

        function resetPaStatus() {
            isPaMode = false;
            document.getElementById('ptt-btn').classList.remove('active-mode');
        }

        function resetAll() {
            playSound('snd-bgm');
            playSound('snd-click');
            resetPaStatus();
            stopPA();
        }

        async function startPA() {
            playSound('snd-bgm');
            playSound('snd-click');

            if (!isPaMode) return;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            try {
                // 마이크 입력 받기
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micSource = audioCtx.createMediaStreamSource(micStream);
                
                // 1. PA 시스템 느낌을 위한 밴드패스 필터 (전화기/스피커 음색)
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1500; // 1.5kHz 중심
                filter.Q.value = 1.0;

                // 2. 기내 울림을 위한 딜레이 효과
                delayNode = audioCtx.createDelay();
                delayNode.delayTime.value = 0.12; 
                feedbackGain = audioCtx.createGain();
                feedbackGain.gain.value = 0.3; 

                // 연결: 마이크 -> 필터 -> 출력 & 딜레이
                micSource.connect(filter);
                filter.connect(audioCtx.destination);
                
                filter.connect(delayNode);
                delayNode.connect(feedbackGain);
                feedbackGain.connect(filter); // 피드백 루프 생성
                
                console.log("PA Broadcast Active...");
            } catch (err) { 
                console.error("Mic access denied.", err); 
                alert("실시간 방송을 위해 마이크 접근 권한이 필요합니다.");
            }
        }

        function stopPA() {
            // 마이크 소스 연결 해제 및 스트림 중단
            if (micSource) {
                micSource.disconnect();
                micSource = null;
            }
            if (micStream) {
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
            }
            console.log("PA Broadcast Ended.");
        }
    </script>
</body>
</html>
