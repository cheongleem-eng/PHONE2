<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B737 Interphone - Official Design</title>
    <style>
        /* 1. 전체 배경 */
        body {
            background-image: url('737background.png');
            background-size: 600px 1000px; 
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 2. 호출 버튼 (CALL) */
        .call-btn-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            transition: opacity 0.5s;
        }
        .call-btn {
            background: radial-gradient(circle, #ff8c00, #ff6600);
            border: 4px solid #fff;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.4), 0 0 40px rgba(255, 102, 0, 0.6);
            animation: pulse 2s infinite;
            transition: transform 0.2s, opacity 0.3s;
            opacity: 0.8;
        }
        .call-btn:hover {
            transform: scale(1.05);
            background: radial-gradient(circle, #ffa033, #ff7700);
            opacity: 1;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 102, 0, 0.7); }
            70% { box-shadow: 0 0 0 25px rgba(255, 102, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 102, 0, 0); }
        }

        /* 3. 인터폰 본체 디자인 */
        .handset-body {
            background-color: #838383;
            width: 155px;
            height: 560px;
            border-radius: 40px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.8), inset -2px -2px 5px rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 10px;
            border: 4px solid #6a6a6a;
            box-sizing: border-box;
            position: relative;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }
        .handset-body.active {
            opacity: 1;
            pointer-events: auto;
        }

        .earpiece-area {
            width: 80px;
            height: 80px;
            background: #6a6a6a;
            border-radius: 50%;
            border: 3px solid #777;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 8px 8px 15px rgba(0,0,0,0.6);
            margin-bottom: 15px;
        }
        .speaker-holes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .hole { width: 5px; height: 5px; background: #222; border-radius: 50%; }

        .info-panel {
            width: 90%;
            background: rgba(0,0,0,0.2);
            border: 1px solid #777;
            padding: 6px 0;
            text-align: center;
            margin-bottom: 20px;
        }
        .info-text { font-size: 8px; color: #ccc; font-family: monospace; }
        .sn-sticker { background: #eee; color: #000; font-size: 9px; padding: 1px 8px; font-weight: bold; margin: 3px 0; display: inline-block;}

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }
        .key {
            background: linear-gradient(145deg, #555, #333);
            border: 1px solid #111;
            color: white;
            cursor: pointer;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .key:active { transform: scale(0.95); background: #222; }

        .ptt-area { width: 85%; margin-bottom: 20px; }
        .ptt-btn {
            width: 100%;
            height: 55px;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #555, #333);
            color: white;
            border: 2px solid #444;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ptt-btn.active-mode { 
            border: 2px solid #ff8c00; 
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.5); 
        }
        .pa-text { font-size: 7px; margin-bottom: 2px; color: #bbb; }
        .ptt-text { font-size: 11px; font-weight: bold; }

        /* PA 통합 제어 패널 스타일 */
        .pa-panel {
            position: fixed;
            top: 20px;
            right: -400px; 
            width: 280px; 
            max-width: 85vw;
            background: rgba(30, 30, 30, 0.98);
            border: 2px solid #ff8c00;
            border-radius: 15px;
            padding: 10px;
            color: white;
            z-index: 2000;
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: -5px 5px 30px rgba(0,0,0,0.8);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .pa-panel.show { right: 10px; }
        .pa-header {
            font-size: 13px; font-weight: bold; color: #ff8c00;
            margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-badge {
            background: #ff0000; color: white; padding: 2px 6px; border-radius: 10px;
            font-size: 9px; display: none; animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .pa-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .tab-btn {
            flex: 1; padding: 6px 1px; background: #444; border: none;
            color: white; border-radius: 5px; cursor: pointer; font-size: 9px;
            transition: background 0.2s;
            text-align: center;
        }
        .tab-btn.active { background: #ff8c00; font-weight: bold; }
        
        .pa-content {
            background: #222; padding: 5px; border-radius: 10px;
            border: 1px solid #333;
            flex-grow: 1;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            min-height: 200px;
            scrollbar-width: thin;
            scrollbar-color: #ff8c00 #222;
        }
        .pa-content::-webkit-scrollbar { width: 4px; }
        .pa-content::-webkit-scrollbar-thumb { background: #ff8c00; border-radius: 10px; }

        .script-img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: none;
            transition: opacity 0.3s ease-in-out;
        }
        .script-img.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }

        /* 비상신호 패널 스타일 (가로형) */
        .emergency-panel {
            position: fixed;
            top: 20px; /* 상단으로 이동 */
            left: -400px; /* 초기 위치 조정 */
            width: 360px; /* 450px에서 20% 축소 */
            max-width: 85vw;
            background: rgba(30, 30, 30, 0.98);
            border: 2px solid #ff0000; 
            border-radius: 12px;
            padding: 8px;
            color: white;
            z-index: 2001;
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 5px 5px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .emergency-panel.show { left: 20px; }
        .emergency-header {
            font-size: 13px; font-weight: bold; color: #ff3333;
            margin-bottom: 6px; border-bottom: 1px solid #444; padding-bottom: 4px;
            text-align: center;
        }
        .emergency-content {
            background: #fff; 
            padding: 4px; border-radius: 5px;
            overflow: auto;
        }
        .emergency-img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 600px) {
            .pa-panel { width: 65vw; right: -70vw; top: 10px; }
            .pa-panel.show { right: 5vw; }
            .pa-content { min-height: 180px; }
            .tab-btn { font-size: 8px; padding: 4px 1px; }

            .emergency-panel { 
                width: 75vw; /* 95vw에서 약 20% 축소 */
                left: -80vw; 
                top: 10px; /* 모바일에서도 상단 */
            }
            .emergency-panel.show { left: 5vw; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 페이지 네비게이션 버튼 */
        .page-nav {
            display: flex; justify-content: space-between; width: 100%;
            margin-top: 15px; gap: 10px;
        }
        .nav-btn {
            background: #555; border: none; color: white;
            padding: 8px 15px; border-radius: 5px; cursor: pointer;
            font-size: 12px; font-weight: bold; flex: 1;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: #777; }
        .nav-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        .mode-title { color: #ff8c00; font-size: 12px; margin-bottom: 10px; font-weight: bold; }

        .reset-btn {
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 6px; font-weight: bold; background: #444;
            color: #ccc; border: 1px solid #222; cursor: pointer;
            margin-bottom: 20px; display: flex; justify-content: center;
            align-items: center; padding: 0; line-height: 1;
        }
        .home-btn {
            position: fixed; bottom: 30px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: radial-gradient(circle, #ff8c00, #ff6600);
            border: 2px solid white; color: white; font-size: 28px;
            cursor: pointer; display: none; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .mouthpiece-area {
            width: 60px; height: 60px; background: #6a6a6a;
            border-radius: 50%; border: 3px solid #777;
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .mesh-pattern {
            width: 100%; height: 100%; background-color: #333;
            background-image: radial-gradient(#555 1.5px, transparent 1.5px);
            background-size: 4px 4px;
        }
        .footer-info {
            position: absolute; bottom: 60px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; color: rgba(255,255,255,0.4);
            font-size: 11px; font-weight: bold; gap: 5px;
        }
        .footer-logo img { height: 60px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="call-btn-container" class="call-btn-container">
        <button class="call-btn" onclick="pickupHandset()">CALL</button>
    </div>

    <div id="interphone" class="handset-body">
        <div class="earpiece-area">
            <div class="speaker-holes">
                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
            </div>
        </div>
        <div class="info-panel">
            <div class="info-text">285W0024-23M MOD NONE</div>
            <div class="sn-sticker">S/N F58930</div>
            <div class="info-text">BAE SYSTEMS</div>
        </div>
        <div class="keypad">
            <button class="key" onclick="handleKeyPress('1')">1</button>
            <button class="key" onclick="handleKeyPress('2')">2</button>
            <button class="key" onclick="handleKeyPress('3')">3</button>
            <button class="key" onclick="handleKeyPress('4')">4</button>
            <button class="key" onclick="handleKeyPress('5')">5</button>
            <button class="key" onclick="handleKeyPress('6')">6</button>
            <button class="key" onclick="handleKeyPress('7')">7</button>
            <button class="key" onclick="handleKeyPress('8')">8</button>
            <button class="key" onclick="handleKeyPress('9')">9</button>
            <button class="key" onclick="handleKeyPress('*')">*</button>
            <button class="key" onclick="handleKeyPress('0')">0</button>
            <button class="key" onclick="handleKeyPress('#')">#</button>
        </div>
        <div class="ptt-area">
            <button id="ptt-btn" class="ptt-btn" onmousedown="startPA()" onmouseup="stopPA()">
                <div class="pa-text">PASSENGER ADDRESS</div>
                <div class="ptt-text">PUSH TO TALK</div>
            </button>
        </div>
        <button class="reset-btn" onclick="resetAll()">RESET</button>
        <div class="mouthpiece-area"><div class="mesh-pattern"></div></div>
    </div>

    <button id="home-btn" class="home-btn" onclick="goHome()">↺</button>

    <!-- PA 통합 제어 패널 -->
    <div id="pa-panel" class="pa-panel">
        <div class="pa-header">
            <span>PASSENGER ADDRESS</span>
            <span id="on-air-badge" class="status-badge">ON AIR</span>
        </div>
        <div class="pa-tabs">
            <button id="tab-general" class="tab-btn active" onclick="switchPAMode('general')">일반 방송</button>
            <button id="tab-t1" class="tab-btn" onclick="switchPAMode('t1')">Turbulence</button>
            <button id="tab-t2" class="tab-btn" onclick="switchPAMode('t2')">Turbulence 지속시</button>
        </div>
        <div id="pa-content" class="pa-content">
            <div id="mode-desc" class="mode-title">GENERAL PA MODE</div>
            <div id="script-container" style="width: 100%; display: flex; justify-content: center; align-items: center; flex-grow: 1;">
                <p id="gen-text" style="text-align: center;">자유롭게 기내 방송을 실시하십시오.</p>
                <!-- 이미지들이 여기에 표시됩니다 -->
            </div>
        </div>
        
        <div id="pa-nav" class="page-nav" style="display: none;">
            <button id="prev-btn" class="nav-btn" onclick="changePage(-1)">이전 페이지</button>
            <button id="next-btn" class="nav-btn" onclick="changePage(1)">다음 페이지</button>
        </div>

        <div style="margin-top: 15px; font-size: 10px; color: #888; text-align: center;">
            PTT를 누르면 마이크가 활성화됩니다.
        </div>
    </div>

    <!-- 비상신호 패널 추가 -->
    <div id="emergency-panel" class="emergency-panel">
        <div class="emergency-header">비상신호 (Emergency Signals)</div>
        <div class="emergency-content">
            <img src="B.png" class="emergency-img" alt="Emergency Signal">
        </div>
        <div style="margin-top: 8px; font-size: 9px; color: #888; text-align: center;">
            2번 버튼을 눌러 활성화되었습니다.
        </div>
    </div>

    <div class="footer-info">
        <div class="footer-logo"><img src="logo.png" alt="Logo"></div>
        <div>JEJU AIR CABIN TRAINING TEAM · 임청</div>
    </div>

    <audio id="snd-bgm" src="button_bgm.mp3" preload="auto"></audio>
    <audio id="snd-five-bgm" src="five_bgm.mp3" preload="auto"></audio>
    <audio id="snd-two-bgm" src="two_bgm.mp3" preload="auto"></audio>
    <audio id="snd-two" src="two.mp3" preload="auto"></audio>
    <audio id="snd-two2" src="two2.mp3" preload="auto"></audio>
    <audio id="snd-crew" src="crew.mp3" preload="auto"></audio>

    <script>
        let isPaMode = false;
        let audioCtx, micSource, delayNode, feedbackGain, micStream;
        let soundTimeouts = [];
        let key2ClickCount = 0;
        let key2Timer = null;

        let currentMode = 'general';
        let currentPage = 0;

        const scripts = {
            'general': {
                title: "GENERAL PA MODE",
                images: []
            },
            't1': {
                title: "TURBULENCE SCENARIO",
                images: ["T1.png", "T1-1.png"]
            },
            't2': {
                title: "TURBULENCE CONTINUOUS",
                images: ["T2.png", "T2-2.png"]
            }
        };

        function switchPAMode(mode) {
            currentMode = mode;
            currentPage = 0;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-general').classList.remove('active'); // 탭 활성화 버그 수정 보완
            
            if(mode === 'general') document.getElementById('tab-general').classList.add('active');
            else document.getElementById('tab-' + mode).classList.add('active');

            document.getElementById('mode-desc').innerText = scripts[mode].title;
            
            const container = document.getElementById('script-container');
            container.innerHTML = ''; 

            if (mode === 'general') {
                container.innerHTML = '<p id="gen-text" style="text-align: center; font-size: 10px; color: #aaa; line-height: 1.5;">자유롭게 기내 방송을 실시하십시오.<br><br>(방송문 없이 마이크 기능만 사용 가능)</p>';
                document.getElementById('pa-nav').style.display = 'none';
            } else {
                scripts[mode].images.forEach((src, idx) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'script-img' + (idx === 0 ? ' active' : '');
                    img.id = 'page-' + idx;
                    container.appendChild(img);
                });
                document.getElementById('pa-nav').style.display = 'flex';
                updateNavButtons();
            }
            
            playSound('snd-bgm');
        }

        function changePage(delta) {
            const maxPages = scripts[currentMode].images.length;
            const newPage = currentPage + delta;

            if (newPage >= 0 && newPage < maxPages) {
                document.getElementById('page-' + currentPage).classList.remove('active');
                currentPage = newPage;
                document.getElementById('page-' + currentPage).classList.add('active');
                updateNavButtons();
                playSound('snd-bgm');
            }
        }

        function updateNavButtons() {
            const maxPages = scripts[currentMode].images.length;
            document.getElementById('prev-btn').disabled = (currentPage === 0);
            document.getElementById('next-btn').disabled = (currentPage === maxPages - 1);
        }

        function pickupHandset() {
            document.getElementById('call-btn-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('call-btn-container').style.display = 'none';
                document.getElementById('interphone').classList.add('active');
                document.getElementById('home-btn').style.display = 'flex';
            }, 300);
            playSound('snd-bgm');
        }

        function playSound(id) {
            const snd = document.getElementById(id);
            if (snd) { snd.currentTime = 0; snd.play().catch(e => {}); }
        }

        function handleKeyPress(key) {
            playSound('snd-bgm');
            if (key === '8') {
                isPaMode = true;
                document.getElementById('ptt-btn').classList.add('active-mode');
                document.getElementById('pa-panel').classList.add('show');
                document.getElementById('emergency-panel').classList.remove('show'); // 비상신호 닫기
                switchPAMode('general');
            } else if (key === '2') {
                // 비상신호 패널 표시
                document.getElementById('emergency-panel').classList.add('show');
                document.getElementById('pa-panel').classList.remove('show'); // PA 패널 닫기
                isPaMode = false;
                document.getElementById('ptt-btn').classList.remove('active-mode');

                key2ClickCount++;
                if (key2ClickCount === 1) {
                    key2Timer = setTimeout(() => {
                        soundTimeouts.push(setTimeout(() => {
                            const snd = document.getElementById('snd-two-bgm');
                            if (snd) { snd.play(); snd.onended = () => { soundTimeouts.push(setTimeout(() => playSound('snd-two'), 500)); }; }
                        }, 300));
                        key2ClickCount = 0;
                    }, 1000);
                } else if (key2ClickCount === 2) {
                    clearTimeout(key2Timer);
                    soundTimeouts.push(setTimeout(() => {
                        const snd = document.getElementById('snd-two-bgm');
                        if (snd) { snd.play(); snd.onended = () => { soundTimeouts.push(setTimeout(() => playSound('snd-two2'), 500)); }; }
                    }, 300));
                    key2ClickCount = 0;
                }
            } else {
                if (key !== '5') {
                    isPaMode = false;
                    document.getElementById('ptt-btn').classList.remove('active-mode');
                    document.getElementById('pa-panel').classList.remove('show');
                    document.getElementById('emergency-panel').classList.remove('show');
                }
                
                if (key === '5') {
                    const snd = document.getElementById('snd-five-bgm');
                    if (snd) {
                        snd.play();
                        snd.onended = () => { soundTimeouts.push(setTimeout(() => playSound('snd-crew'), 500)); };
                    }
                }
            }
        }

        async function startPA() {
            if (!isPaMode) return;
            playSound('snd-bgm');
            document.getElementById('on-air-badge').style.display = 'inline';
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            try {
                // 에코 캔슬링 및 노이즈 억제 활성화
                micStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    } 
                });
                
                micSource = audioCtx.createMediaStreamSource(micStream);
                
                // 기내 방송 느낌을 위한 필터 (고음과 저음을 살짝 깎음)
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 1000; // 중심 주파수 조정
                filter.Q.value = 0.8;

                // 소리 크기를 일정하게 맞추고 찢어지는 소리 방지
                const compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.setValueAtTime(-24, audioCtx.currentTime);
                compressor.knee.setValueAtTime(40, audioCtx.currentTime);
                compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                compressor.attack.setValueAtTime(0, audioCtx.currentTime);
                compressor.release.setValueAtTime(0.25, audioCtx.currentTime);

                // 연결: 마이크 -> 필터 -> 컴프레서 -> 스피커
                micSource.connect(filter);
                filter.connect(compressor);
                compressor.connect(audioCtx.destination);
                
            } catch (err) { 
                console.error("마이크 연결 오류:", err); 
            }
        }

        function stopPA() {
            document.getElementById('on-air-badge').style.display = 'none';
            if (micStream) { 
                micStream.getTracks().forEach(track => track.stop()); 
                micStream = null; 
            }
            if (micSource) {
                micSource.disconnect();
                micSource = null;
            }
        }

        function resetAll() {
            soundTimeouts.forEach(t => clearTimeout(t));
            isPaMode = false;
            document.getElementById('ptt-btn').classList.remove('active-mode');
            document.getElementById('pa-panel').classList.remove('show');
            document.getElementById('emergency-panel').classList.remove('show');
            stopPA();
            playSound('snd-bgm');
        }

        function goHome() {
            resetAll();
            document.getElementById('home-btn').style.display = 'none';
            document.getElementById('interphone').classList.remove('active');
            setTimeout(() => {
                document.getElementById('call-btn-container').style.display = 'block';
                document.getElementById('call-btn-container').style.opacity = '1';
            }, 600);
        }
    </script>
</body>
